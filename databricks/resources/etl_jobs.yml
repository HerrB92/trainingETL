# Databricks Job definitions
# All jobs use serverless compute (environment_key: default) — no VM quota required.
# The ETL wheel is built and uploaded by the bundle on every deploy.
#
# Individual stage jobs (bronze/silver/gold/genai) run standalone.
# etl_full_pipeline orchestrates all stages in sequence within one job.

resources:
  jobs:
    etl_bronze_ingest:
      name: "ETL — Bronze Ingestion [${bundle.target}]"
      description: "Ingest all OLTP tables from Azure SQL to Bronze Delta Lake"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: bronze_ingest
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.bronze.ingest

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"  # 06:00 UTC daily
        timezone_id: "Europe/Berlin"
        pause_status: PAUSED  # unpaused manually in prod

      email_notifications:
        on_failure:
          - b.behrens@btech.de

    etl_silver_transform:
      name: "ETL — Silver Transform [${bundle.target}]"
      description: "Cleanse and validate Bronze data into Silver Delta tables"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: silver_customers
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_customers

        - task_key: silver_products
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_products

        - task_key: silver_orders
          depends_on:
            - task_key: silver_customers
            - task_key: silver_products
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_orders

    etl_gold_build:
      name: "ETL — Gold Star Schema [${bundle.target}]"
      description: "Build Kimball star schema from Silver tables"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: gold_star_schema
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.gold.star_schema

    etl_genai_enrich:
      name: "ETL — GenAI Enrichment [${bundle.target}]"
      description: "Generate product embeddings and LLM-based categorization"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: categorize_products
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.genai.categorization

        - task_key: generate_embeddings
          depends_on:
            - task_key: categorize_products
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.genai.embeddings

      schedule:
        quartz_cron_expression: "0 0 8 ? * SUN"  # Weekly on Sunday at 08:00 UTC
        timezone_id: "Europe/Berlin"
        pause_status: PAUSED

    etl_full_pipeline:
      name: "ETL — Full Pipeline [${bundle.target}]"
      description: "Orchestrates Bronze → Silver → Gold → GenAI in sequence"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:
        - task_key: bronze
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.bronze.ingest

        - task_key: silver_customers
          depends_on: [{task_key: bronze}]
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_customers

        - task_key: silver_products
          depends_on: [{task_key: bronze}]
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_products

        - task_key: silver_orders
          depends_on:
            - task_key: silver_customers
            - task_key: silver_products
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.silver.transform_orders

        - task_key: gold
          depends_on: [{task_key: silver_orders}]
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.gold.star_schema

        - task_key: genai
          depends_on: [{task_key: gold}]
          environment_key: default
          python_wheel_task:
            package_name: etl
            entry_point: etl.genai.embeddings
