# Databricks Asset Bundle (DAB) root configuration
#
# A "bundle" packages all Databricks objects (jobs, notebooks, etc.)
# into a single deployable unit managed via the Databricks CLI.
#
# Deploy with: databricks bundle deploy --target dev
# Run a job:   databricks bundle run etl_bronze_ingest

bundle:
  name: b2b-etl-platform

# The ETL wheel is built from etl/ and uploaded to the workspace on deploy.
# All jobs reference this artifact via environment_key — no VM quota needed.
artifacts:
  etl:
    type: whl
    path: ../etl
    build: python3 -m pip wheel . --no-deps -w dist

targets:
  dev:
    mode: development   # adds [dev <username>] prefix to avoid conflicts
    default: true
    workspace:
      host: https://adb-7405615143415115.15.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-7405615143415115.15.azuredatabricks.net  # update when prod workspace exists

# Include job resource files
include:
  - resources/*.yml
